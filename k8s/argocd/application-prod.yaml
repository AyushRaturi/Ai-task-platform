apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-task-platform-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/AyushRaturi/Ai-task-platform.git
    targetRevision: main
    path: k8s/overlays/production

  destination:
    server: https://kubernetes.default.svc
    namespace: ai-task-platform

  syncPolicy:
    automated:
      prune: true       # Remove resources no longer in Git
      selfHeal: true    # Revert manual changes to match Git state
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks override for StatefulSets
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
